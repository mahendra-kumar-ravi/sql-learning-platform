<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQLPath — Track</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="nav-logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/>
      <path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/>
    </svg>
    <span>SQL<b>Path</b></span>
  </div>
  <div class="nav-links">
    <a href="index.html">Tracks</a>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <a href="index.html" class="back-link">← All Tracks</a>
    <h2 id="pageTitle">Loading...</h2>
    <div class="sub" id="pageDesc"></div>
  </div>

  <div class="progress-summary" id="progressSummary">
    <div class="progress-text">
      <strong id="doneCount">0</strong> / <strong id="totalCount">0</strong> completed
    </div>
    <div class="prog-bar-wrap">
      <div class="prog-bar">
        <div class="prog-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="prog-pct" id="progressPct">0% done</div>
    </div>
  </div>

  <div class="question-list" id="questionList"></div>
</div>

<script src="js/app.js"></script>
<script src="js/questions.js"></script>
<script>
  const trackId = getParam('track');
  if (!trackId || !QUESTIONS[trackId]) {
    window.location.href = 'index.html';
  }

  const trackMeta = TRACKS.find(t => t.id === trackId);
  const questions = QUESTIONS[trackId];

  document.title = `SQLPath — ${trackMeta.name} ${trackMeta.tagline}`;
  document.getElementById('pageTitle').textContent = `${trackMeta.name} · ${trackMeta.tagline}`;
  document.getElementById('pageDesc').textContent = trackMeta.desc;

  const completed = getCompletedCount(trackId);
  const total = questions.length;
  const pct = total ? Math.round((completed / total) * 100) : 0;

  document.getElementById('doneCount').textContent = completed;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '% done';

  const list = document.getElementById('questionList');

  questions.forEach((q, idx) => {
    const done = isCompleted(trackId, q.id);
    const diff = q.difficulty.toLowerCase();

    const item = document.createElement('a');
    item.className = `q-item${done ? ' done' : ''} fade-up`;
    item.style.animationDelay = `${idx * 0.04}s`;
    item.style.opacity = '0';
    item.href = `editor.html?track=${trackId}&q=${q.id}`;

    item.innerHTML = `
      <div class="q-num">${String(idx + 1).padStart(2, '0')}</div>
      <div class="q-info">
        <div class="q-title">${q.title}</div>
        <div class="q-meta">${q.category}</div>
      </div>
      <span class="q-badge badge-${diff}">${q.difficulty}</span>
      <span class="q-status">${done ? '✅' : '○'}</span>
    `;

    list.appendChild(item);
  });
</script>
</body>
</html>
