<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQLPath — Learn SQL by Track</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="nav-logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/>
      <path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/>
    </svg>
    <span>SQL<b>Path</b></span>
  </div>
  <div class="nav-user">
    <button id="userMenuBtn" class="user-btn">
      <span id="userStatus">Guest</span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </button>
    <div id="userMenu" class="user-menu">
      <div id="userInfo"></div>
      <button id="loginBtn">Login</button>
      <button id="logoutBtn" style="display:none;">Logout</button>
    </div>
  </div>
</nav>

<!-- Hero -->
<section class="hero container fade-up">
  <div class="hero-badge">🚀 Free SQL Learning Platform</div>
  <h1>Learn SQL<br/><em>The Right Way</em></h1>
  <p>Structured tracks for real roles — not random questions. Pick your path and grow from beginner to interview-ready.</p>

  <div class="stats-bar fade-up delay-1">
    <div class="stat-item">
      <div class="num" style="color: #22c55e;">20+</div>
      <div class="label">Questions</div>
    </div>
    <div class="stat-item">
      <div class="num" style="color: #7c6bff;">4</div>
      <div class="label">Tracks</div>
    </div>
    <div class="stat-item">
      <div class="num" style="color: #ff6b9d;">3</div>
      <div class="label">Roles</div>
    </div>
    <div class="stat-item">
      <div class="num" style="color: #f59e0b;">₹0</div>
      <div class="label">Cost</div>
    </div>
  </div>
</section>

<!-- Tracks -->
<section class="container fade-up delay-2">
  <div class="tracks-heading">Choose Your Track</div>
  <div class="tracks-grid" id="tracksGrid"></div>
</section>

<script type="module" src="js/app.js"></script>
<script type="module" src="js/questions.js"></script>
<script src="js/api.js" type="module"></script>
<script src="js/auth.js" type="module"></script>
  <!-- Auth Modal -->
  <div id="authModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
<button class="close-btn">&times;</button>
        <h3 id="modalTitle">Login</h3>
      </div>
      <div class="tab-buttons">
        <button id="loginTab" class="tab-btn active">Login</button>
        <button id="registerTab" class="tab-btn">Register</button>
      </div>
      <form id="authForm">
        <div id="loginFields">
          <input type="email" id="loginEmail" placeholder="Email" required>
          <input type="password" id="loginPassword" placeholder="Password" required>
          <button type="submit" class="btn btn-primary full">Login</button>
        </div>
        <div id="registerFields" style="display:none;">
          <input type="text" id="regUsername" placeholder="Username" required>
          <input type="email" id="regEmail" placeholder="Email" required>
          <input type="password" id="regPassword" placeholder="Password" required>
          <button type="submit" class="btn btn-primary full">Register</button>
        </div>
      </form>
      <div class="modal-footer">
        <p>Demo: admin@example.com / admin123</p>
      </div>
    </div>
  </div>
</body>
</html>
