<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQLPath — Editor</title>
  <link rel="stylesheet" href="css/style.css" />
  <!-- sql.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/sql-wasm.js"></script>
  <style>
    body { overflow: hidden; }
    @media (max-width: 900px) { body { overflow: auto; } }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <div class="nav-logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/>
      <path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/>
    </svg>
    <span>SQL<b>Path</b></span>
  </div>
  <div class="nav-links">
    <a id="backToTrack" href="#">← Back</a>
  </div>
</nav>

<!-- Main Layout -->
<div class="editor-layout" id="editorLayout">

  <!-- LEFT: Question Panel -->
  <div class="panel problem-panel">
    <div class="panel-header">
      <span class="panel-title">Problem</span>
      <span id="qCounter" style="font-size:0.75rem; color:var(--muted); font-family:var(--mono);">01 / 10</span>
    </div>
    <div class="panel-body" id="questionBody">
      <div class="problem-section">
        <div class="section-label">Problem Description</div>
        <div class="q-difficulty">
          <span class="q-badge" id="diffBadge">Easy</span>
          <span class="question-category" id="questionCategory">SELECT</span>
        </div>
        <div class="q-problem-title" id="qTitle">Loading...</div>
        <div class="q-statement" id="qStatement"></div>
      </div>

      <div class="problem-section">
        <div class="section-label">Table Schema</div>
        <div id="schemaBox"></div>
      </div>

      <div class="problem-section">
        <div class="section-label">Sample Input Data</div>
        <div id="sampleInput"></div>
      </div>

      <div class="problem-section">
        <div class="section-label">Expected Output</div>
        <div class="sample-output" id="sampleOutput"></div>
      </div>
    </div>
    <div class="q-nav">
      <button class="btn btn-ghost" id="prevBtn" onclick="navigate(-1)">← Prev</button>
      <button class="btn btn-ghost" id="nextBtn" onclick="navigate(1)" style="margin-left:auto;">Next →</button>
    </div>
  </div>

  <div
    class="resize-handle resize-handle-vertical"
    id="verticalResizeHandle"
    role="separator"
    aria-orientation="vertical"
    aria-label="Resize problem and workspace panels"
  ></div>

  <!-- RIGHT: Editor + Output stacked -->
  <div class="workspace-stack">

    <!-- Editor -->
    <div class="panel editor-panel">
      <div class="panel-header">
        <span class="panel-title">SQL Editor</span>
        <span style="font-size:0.72rem; color: var(--muted);">sql.js · in-browser</span>
      </div>
      <div class="editor-wrap">
        <textarea id="sqlInput" placeholder="-- Write your SQL query here
SELECT ..."></textarea>
        <div class="editor-actions">
          <button class="btn btn-primary" onclick="runQuery()">▶ Run</button>
          <button class="btn btn-ghost" onclick="showSolution()">👁 Solution</button>
          <button class="btn btn-ghost" onclick="resetQuery()">↺ Reset</button>
        </div>
      </div>
    </div>

    <div
      class="resize-handle resize-handle-horizontal"
      id="horizontalResizeHandle"
      role="separator"
      aria-orientation="horizontal"
      aria-label="Resize editor and output panels"
    ></div>

    <!-- Output -->
    <div class="panel output-panel">
      <div class="panel-header">
        <span class="panel-title">Output</span>
        <span id="rowCount" style="font-size:0.72rem; color:var(--muted);"></span>
      </div>
      <div class="output-section" id="outputSection">
        <div class="output-placeholder">
          <div class="icon">⚡</div>
          <div>Run your query to see results</div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Celebration Modal -->
<div class="celebration" id="celebration">
  <div class="celeb-card">
    <div class="celeb-icon">🎉</div>
    <div class="celeb-title">Correct!</div>
    <div class="celeb-msg" id="celebMsg">Great work. Query matches the expected output.</div>
    <div class="celeb-actions">
      <button class="btn btn-ghost" onclick="closeCelebration()">Stay Here</button>
      <button class="btn btn-primary" id="nextQBtn" onclick="navigate(1)">Next →</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/questions.js"></script>
<script>
  // ── Globals ──────────────────────────────────────────────────────
  let SQLLib = null;
  let db = null;
  let currentQ = null;
  let trackId = '';
  let trackQuestions = [];
  let currentIdx = 0;
  const panelPrefsKey = 'sqlpathPanelPrefs';

  // ── Init sql.js ───────────────────────────────────────────────────
  initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}` })
    .then(SQL => {
      SQLLib = SQL;
      db = new SQL.Database();
      bootstrap();
    })
    .catch(err => {
      showStatus('Failed to load SQL engine: ' + err, 'error');
    });

  // ── Bootstrap ─────────────────────────────────────────────────────
  function bootstrap() {
    trackId = getParam('track');
    const qId = parseInt(getParam('q'));

    if (!trackId || !QUESTIONS[trackId]) { window.location.href = 'index.html'; return; }

    trackQuestions = QUESTIONS[trackId];
    const meta = TRACKS.find(t => t.id === trackId);

    document.getElementById('backToTrack').href = `track.html?track=${trackId}`;
    document.getElementById('backToTrack').textContent = `← ${meta.name} · ${meta.tagline}`;

    // Find question index
    currentIdx = trackQuestions.findIndex(q => q.id === qId);
    if (currentIdx < 0) currentIdx = 0;

    loadQuestion(currentIdx);
  }

  // ── Load Question ─────────────────────────────────────────────────
  function loadQuestion(idx) {
    currentIdx = idx;
    currentQ = trackQuestions[idx];

    // Nav buttons
    document.getElementById('prevBtn').disabled = idx === 0;
    document.getElementById('nextBtn').disabled = idx === trackQuestions.length - 1;

    // Counter
    document.getElementById('qCounter').textContent =
      String(idx + 1).padStart(2,'0') + ' / ' + String(trackQuestions.length).padStart(2,'0');

    // Difficulty badge
    const badge = document.getElementById('diffBadge');
    badge.textContent = currentQ.difficulty;
    badge.className = 'q-badge badge-' + currentQ.difficulty.toLowerCase();

    document.getElementById('questionCategory').textContent = currentQ.category;
    document.getElementById('qTitle').textContent = currentQ.title;
    document.getElementById('qStatement').textContent = currentQ.question;
    renderSchemaSection();

    // Reset editor + output
    document.getElementById('sqlInput').value = '';
    document.getElementById('rowCount').textContent = '';
    document.getElementById('outputSection').innerHTML = `
      <div class="output-placeholder">
        <div class="icon">⚡</div>
        <div>Run your query to see results</div>
      </div>`;
    document.getElementById('sampleOutput').innerHTML = `
      <div class="sample-placeholder">Loading sample output...</div>`;
    document.getElementById('sampleInput').innerHTML = `
      <div class="sample-placeholder">Loading sample input...</div>`;

    // Load schema into db
    if (db) {
      try {
        db.run(currentQ.schema);
      } catch(e) {
        // tables may already exist on schema re-runs; re-create
        try {
          // drop and recreate
          const tables = db.exec("SELECT name FROM sqlite_master WHERE type='table'");
          if (tables.length) {
            tables[0].values.forEach(([name]) => db.run(`DROP TABLE IF EXISTS "${name}"`));
          }
          db.run(currentQ.schema);
        } catch(e2) { /* ignore */ }
      }
    }

    renderSampleInput();
    renderSampleOutput();

    // Update URL without reload
    const url = new URL(window.location);
    url.searchParams.set('q', currentQ.id);
    window.history.replaceState({}, '', url);
  }

  // ── Run Query ─────────────────────────────────────────────────────
  function runQuery() {
    if (!db) return;
    const sql = document.getElementById('sqlInput').value.trim();
    if (!sql) return;

    const out = document.getElementById('outputSection');
    out.innerHTML = '';

    try {
      const results = db.exec(sql);
      if (!results || results.length === 0) {
        showStatus('Query executed — no rows returned.', 'info');
        return;
      }

      const { columns, values } = results[0];

      document.getElementById('rowCount').textContent = `${values.length} row${values.length !== 1 ? 's' : ''}`;

      // Check correctness
      const isCorrect = checkAnswer(columns, values);

      if (isCorrect) {
        saveProgress(trackId, currentQ.id);
        showCelebration();
        activateSteps();
      }

      // Status
      const statusEl = document.createElement('div');
      statusEl.className = `result-status ${isCorrect ? 'status-success' : 'status-info'}`;
      statusEl.innerHTML = isCorrect ? '✅ Correct answer!' : `ℹ️ ${values.length} row(s) returned`;
      out.appendChild(statusEl);

      out.appendChild(buildResultTable(columns, values));

    } catch(err) {
      document.getElementById('rowCount').textContent = '';
      const statusEl = document.createElement('div');
      statusEl.className = 'result-status status-error';
      statusEl.textContent = '✗ ' + err.message;
      out.innerHTML = '';
      out.appendChild(statusEl);
    }
  }

  function buildResultTable(columns, values) {
    const table = document.createElement('table');
    table.className = 'result-table';

    const thead = document.createElement('thead');
    thead.innerHTML = '<tr>' + columns.map(c => `<th>${c}</th>`).join('') + '</tr>';
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    values.forEach(row => {
      const tr = document.createElement('tr');
      tr.innerHTML = row.map(v => `<td>${v === null ? '<em style="color:var(--muted)">NULL</em>' : v}</td>`).join('');
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);

    return table;
  }

  function parseSchemaTables(schema) {
    const tables = [];
    const createRegex = /CREATE TABLE\s+([a-zA-Z_][\w]*)\s*\(([\s\S]*?)\);/gi;
    let match;

    while ((match = createRegex.exec(schema)) !== null) {
      const tableName = match[1];
      const body = match[2];
      const columns = body
        .split(',')
        .map(part => part.trim())
        .filter(Boolean)
        .filter(part => !/^foreign key/i.test(part) && !/^primary key/i.test(part))
        .map(part => {
          const cleaned = part.replace(/\s+/g, ' ').trim();
          const pieces = cleaned.split(' ');
          return {
            name: pieces[0],
            type: pieces[1] || '',
            extras: pieces.slice(2).join(' ')
          };
        });

      const primaryKeys = columns
        .filter(col => /primary key/i.test(col.extras))
        .map(col => col.name);

      tables.push({ name: tableName, columns, primaryKeys });
    }

    return tables;
  }

  function renderSchemaSection() {
    const schemaEl = document.getElementById('schemaBox');
    const tables = parseSchemaTables(currentQ.schema || '');

    schemaEl.innerHTML = '';

    if (!tables.length) {
      schemaEl.innerHTML = '<div class="sample-placeholder">No schema available.</div>';
      return;
    }

    tables.forEach(table => {
      const block = document.createElement('div');
      block.className = 'table-block';

      const title = document.createElement('div');
      title.className = 'table-name';
      title.textContent = `Table: ${table.name}`;
      block.appendChild(title);

      block.appendChild(buildResultTable(
        ['Column Name', 'Type'],
        table.columns.map(col => [col.name, col.type.toLowerCase()])
      ));

      if (table.primaryKeys.length) {
        const pk = document.createElement('div');
        pk.className = 'table-note';
        pk.textContent = `Primary key: ${table.primaryKeys.join(', ')}`;
        block.appendChild(pk);
      }

      schemaEl.appendChild(block);
    });
  }

  function renderSampleInput() {
    const inputEl = document.getElementById('sampleInput');
    const tables = parseSchemaTables(currentQ.schema || '');

    inputEl.innerHTML = '';

    if (!tables.length || !db) {
      inputEl.innerHTML = '<div class="sample-placeholder">No sample input available.</div>';
      return;
    }

    tables.forEach(table => {
      const block = document.createElement('div');
      block.className = 'table-block';

      const title = document.createElement('div');
      title.className = 'table-name';
      title.textContent = `${table.name} table:`;
      block.appendChild(title);

      try {
        const results = db.exec(`SELECT * FROM ${table.name}`);
        if (!results.length) {
          const empty = document.createElement('div');
          empty.className = 'sample-placeholder';
          empty.textContent = 'No rows available.';
          block.appendChild(empty);
        } else {
          block.appendChild(buildResultTable(results[0].columns, results[0].values));
        }
      } catch (err) {
        const error = document.createElement('div');
        error.className = 'sample-placeholder';
        error.textContent = `Unable to load sample input: ${err.message}`;
        block.appendChild(error);
      }

      inputEl.appendChild(block);
    });
  }

  function renderSampleOutput() {
    const sampleEl = document.getElementById('sampleOutput');
    if (!SQLLib || !currentQ) return;

    try {
      const sampleDb = new SQLLib.Database();
      sampleDb.run(currentQ.schema);
      const results = sampleDb.exec(currentQ.solution);

      if (!results || results.length === 0) {
        sampleEl.innerHTML = '<div class="sample-placeholder">No sample rows returned for this solution.</div>';
        return;
      }

      const { columns, values } = results[0];
      sampleEl.innerHTML = '';
      sampleEl.appendChild(buildResultTable(columns, values));
    } catch (err) {
      sampleEl.innerHTML = `<div class="sample-placeholder">Unable to render sample output: ${err.message}</div>`;
    }
  }

  // ── Check Answer ─────────────────────────────────────────────────
  function checkAnswer(columns, values) {
    if (!currentQ.expected_columns) return false;

    // Check that all expected columns are present (case insensitive)
    const colsLower = columns.map(c => c.toLowerCase());
    const expectedLower = currentQ.expected_columns.map(c => c.toLowerCase());
    return expectedLower.every(c => colsLower.includes(c)) && values.length > 0;
  }

  // ── Show Status ───────────────────────────────────────────────────
  function showStatus(msg, type) {
    const out = document.getElementById('outputSection');
    const el = document.createElement('div');
    el.className = `result-status status-${type}`;
    el.textContent = msg;
    out.innerHTML = '';
    out.appendChild(el);
  }

  // ── Show Solution ─────────────────────────────────────────────────
  function showSolution() {
    document.getElementById('sqlInput').value = currentQ.solution;
  }

  // ── Reset ─────────────────────────────────────────────────────────
  function resetQuery() {
    document.getElementById('sqlInput').value = '';
    document.getElementById('outputSection').innerHTML = `
      <div class="output-placeholder">
        <div class="icon">⚡</div>
        <div>Run your query to see results</div>
      </div>`;
    document.getElementById('rowCount').textContent = '';
  }

  // ── Navigate ──────────────────────────────────────────────────────
  function navigate(dir) {
    const next = currentIdx + dir;
    if (next < 0 || next >= trackQuestions.length) {
      if (dir > 0) window.location.href = `track.html?track=${trackId}`;
      return;
    }
    closeCelebration();

    // Re-init db for fresh schema
    initSqlJs({ locateFile: f => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.2/${f}` })
      .then(SQL => {
        SQLLib = SQL;
        db = new SQL.Database();
        loadQuestion(next);
      });
  }

  // ── Celebration ───────────────────────────────────────────────────
  function showCelebration() {
    const msgs = [
      "Perfect! Your query nailed it.",
      "Excellent work! That's exactly right.",
      "Great job! Moving onwards and upwards.",
      "Correct! You're getting good at this."
    ];
    document.getElementById('celebMsg').textContent = msgs[Math.floor(Math.random() * msgs.length)];
    document.getElementById('celebration').classList.add('show');

    // Disable next in modal if last question
    const nextBtn = document.getElementById('nextQBtn');
    if (currentIdx >= trackQuestions.length - 1) {
      nextBtn.textContent = 'Finish Track ✓';
      nextBtn.onclick = () => window.location.href = `track.html?track=${trackId}`;
    } else {
      nextBtn.textContent = 'Next →';
      nextBtn.onclick = () => navigate(1);
    }
  }

  function closeCelebration() {
    document.getElementById('celebration').classList.remove('show');
  }

  // Close on backdrop click
  document.getElementById('celebration').addEventListener('click', function(e) {
    if (e.target === this) closeCelebration();
  });

  // ── Activate Steps ────────────────────────────────────────────────
  function activateSteps() {
    const items = document.querySelectorAll('.step-item');
    items.forEach((el, i) => {
      setTimeout(() => el.classList.add('active'), i * 300);
    });
  }

  // ── Keyboard Shortcut ─────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      runQuery();
    }
  });

  initResizablePanels();

  function initResizablePanels() {
    const layout = document.getElementById('editorLayout');
    const verticalHandle = document.getElementById('verticalResizeHandle');
    const horizontalHandle = document.getElementById('horizontalResizeHandle');
    if (!layout || !verticalHandle || !horizontalHandle) return;

    applyStoredPanelPrefs(layout);
    bindResizeHandle({
      handle: verticalHandle,
      getStartSize: () => getCurrentPanelSize(layout, '--problem-panel-width', 420),
      onDrag: (startSize, delta) => resizeColumns(layout, startSize, delta)
    });
    bindResizeHandle({
      handle: horizontalHandle,
      getStartSize: () => getCurrentPanelSize(layout, '--editor-panel-height', 320),
      onDrag: (startSize, delta) => resizeRows(layout, startSize, delta)
    });
  }

  function bindResizeHandle({ handle, getStartSize, onDrag }) {
    handle.addEventListener('pointerdown', event => {
      if (window.innerWidth <= 900) return;

      const isVertical = handle.classList.contains('resize-handle-vertical');
      const start = isVertical ? event.clientX : event.clientY;
      const startSize = getStartSize();
      handle.setPointerCapture(event.pointerId);
      document.body.classList.add('is-resizing');
      handle.classList.add('is-active');

      const onMove = moveEvent => {
        const current = isVertical ? moveEvent.clientX : moveEvent.clientY;
        onDrag(startSize, current - start);
      };

      const stop = () => {
        document.body.classList.remove('is-resizing');
        handle.classList.remove('is-active');
        window.removeEventListener('pointermove', onMove);
        window.removeEventListener('pointerup', stop);
        window.removeEventListener('pointercancel', stop);
        persistPanelPrefs();
      };

      window.addEventListener('pointermove', onMove);
      window.addEventListener('pointerup', stop);
      window.addEventListener('pointercancel', stop);
    });
  }

  function getCurrentPanelSize(layout, cssVar, fallback) {
    const current = parseFloat(getComputedStyle(layout).getPropertyValue(cssVar));
    return Number.isFinite(current) ? current : fallback;
  }

  function resizeColumns(layout, startSize, delta) {
    const next = Math.min(Math.max(startSize + delta, 280), Math.max(window.innerWidth * 0.6, 520));
    layout.style.setProperty('--problem-panel-width', `${next}px`);
  }

  function resizeRows(layout, startSize, delta) {
    const next = Math.min(Math.max(startSize + delta, 180), Math.max((window.innerHeight - 220) * 0.75, 340));
    layout.style.setProperty('--editor-panel-height', `${next}px`);
  }

  function persistPanelPrefs() {
    const layout = document.getElementById('editorLayout');
    if (!layout) return;

    const problemWidth = getComputedStyle(layout).getPropertyValue('--problem-panel-width').trim();
    const editorHeight = getComputedStyle(layout).getPropertyValue('--editor-panel-height').trim();

    localStorage.setItem(panelPrefsKey, JSON.stringify({
      problemWidth,
      editorHeight
    }));
  }

  function applyStoredPanelPrefs(layout) {
    try {
      const prefs = JSON.parse(localStorage.getItem(panelPrefsKey) || '{}');
      if (prefs.problemWidth) layout.style.setProperty('--problem-panel-width', prefs.problemWidth);
      if (prefs.editorHeight) layout.style.setProperty('--editor-panel-height', prefs.editorHeight);
    } catch (err) {
      localStorage.removeItem(panelPrefsKey);
    }
  }
</script>
</body>
</html>
